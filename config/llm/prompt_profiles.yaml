# CMIS LLM Prompt Profiles (Phase 2)
#
# 목적(비개발자 설명):
# - 같은 Task라도 상황(예: JSON 파싱 실패)별로 "프롬프트 스타일"을 바꿀 필요가 있습니다.
# - 이 파일은 프롬프트 스타일(프로파일)을 버전 관리하고, 선택/에스컬레이션에서 참조할 수 있게 합니다.
#
# 설계 문서:
# - dev/docs/architecture/CMIS_LLM_Model_Management_Design_v1.1.0.md (Section 6 / 8)
schema_version: 1
last_updated: "2025-12-21"
registry_version: "1.1.0-alpha"

profiles:
  default:
    description: "기본 프롬프트(추가 규칙 없음)"
    prefix: ""

  strict_json:
    description: "JSON-only 출력 강제"
    prefix: |
      중요: 반드시 JSON만 출력하세요. 설명/코드블록/여분 텍스트를 포함하지 마세요.
      JSON 외의 문자가 섞이면 실패로 처리됩니다.


