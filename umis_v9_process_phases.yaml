---
umis_v9_process_phases:
  meta:
    description: "canonical_workflows의 상세 Phase 분해 (v7 Adult Language 사례 기반 최소 버전)"
    linked_to: "umis_v9.yaml#canonical_workflows"

  workflows:
    structure_analysis:
      workflow_id: "structure_analysis"
      role_id: "structure_analyst"
      mode: "greenfield"
      total_phases: 14
      estimated_duration: "3-5 days"
      notes:
        - "v7 Market Reality Report 14 Phase 구조에서 핵심 Phase만 우선 반영."
        - "추후 경쟁/검증/리포트 Phase를 세분화하여 14 Phase로 확장 예정."
        - "Greenfield: 시장 전체 분석, project_context_id 불필요"

      phases:
        - phase_id: "PH01_market_definition"
          sequence: 1
          name: "시장 정의 및 경계 설정"
          owner: "structure_analyst"
          duration: "1-2 hours"

          inputs:
            - type: "user_query"
              content: "시장/도메인 범위 질문"

          activities:
            - "Needs 전수 분류 (A-D 카테고리)"
            - "시장 경계 정의 (포함/제외)"
            - "거래 주체별 분류 (B2C/B2B/B2G)"

          outputs:
            - type: "artifact"
              id: "ART-needs_classification"
              format: "structured_yaml"
              content:
                - "Needs 분류 체계"
                - "시장 포함/제외 범위"

          validation:
            type: "self_check"
            criteria:
              - "Needs가 MECE인가?"
              - "거래 관찰 가능한가?"
              - "시장 경계가 명확한가?"

          success_criteria:
            - "모든 Needs가 A-D 중 하나에 할당"
            - "포함/제외 범위 명시"

        - phase_id: "PH02_domain_classification"
          sequence: 2
          name: "도메인 MECE 분류"
          owner: "structure_analyst"
          duration: "1 hour"

          depends_on:
            - "PH01_market_definition"

          inputs:
            - type: "artifact"
              id: "ART-needs_classification"

          activities:
            - "도메인 축 정의 (언어, 제품 카테고리 등)"
            - "도메인별 MECE 분류"
            - "도메인별 추정 점유율"

          outputs:
            - type: "artifact"
              id: "ART-domain_classification"
              format: "structured_yaml"

          validation:
            type: "mece_check"
            criteria:
              - "Mutually Exclusive"
              - "Collectively Exhaustive (100%)"

        - phase_id: "PH03_bm_framework"
          sequence: 3
          name: "비즈니스 모델 분류 프레임워크"
          owner: "structure_analyst"
          duration: "1.5 hours"

          inputs:
            - type: "framework_library"
              id: "bm_classification_framework"

          activities:
            - "BM 분류 축 정의 (Delivery/Interaction/Transaction)"
            - "BM 매트릭스 작성"
            - "BM 그룹핑"

          outputs:
            - type: "artifact"
              id: "ART-bm_framework"

          validation:
            type: "framework_check"
            criteria:
              - "MECE 프레임워크인가?"
              - "관찰 가능한 거래 구조인가?"

        - phase_id: "PH04_bm_enumeration"
          sequence: 4
          name: "BM 전수조사"
          owner: "structure_analyst"

          activities:
            - "모든 BM 상세 정의"
            - "Edge Cases 검토"
            - "BM별 특성 Summary"

          outputs:
            - type: "artifact"
              id: "ART-bm_complete_list"

          validation:
            type: "exhaustiveness_check"
            criteria:
              - "누락 BM 없는가?"
              - "Edge Cases 처리했는가?"

        - phase_id: "PH05_player_identification"
          sequence: 5
          name: "주요 플레이어 식별 및 데이터 수집"
          owner: "structure_analyst"
          collaborators:
            - role: "reality_monitor"
              responsibility: "데이터 수집 및 신뢰도 평가"

          activities:
            - "BM별 Top 플레이어 목록 작성"
            - "데이터 소스 후보 식별"
            - "데이터 수집 요청 발행"

          outputs:
            - type: "artifact"
              id: "ART-player_list"
            - type: "request"
              id: "REQ-reality_data_collection"
              target_role: "reality_monitor"
              template: "data_collection_request"

          validation:
            type: "completeness_check"

        - phase_id: "PH06_value_chain_mapping"
          sequence: 6
          name: "가치사슬 구조 맵핑"
          owner: "structure_analyst"

          inputs:
            - type: "artifact"
              id: "ART-player_list"
            - type: "framework"
              id: "value_chain_template"

          activities:
            - "BM별 돈의 흐름 추적 (누가→누구→얼마)"
            - "가치사슬 단계 식별"
            - "핵심 비용/마진 구조 관찰/추정"

          outputs:
            - type: "artifact"
              id: "ART-value_chain_map"
            - type: "estimation_requests"
              ids: ["EST-margin_rates"]

          validation:
            type: "flow_check"
            criteria:
              - "모든 돈의 흐름이 추적되는가?"
              - "합계가 100%인가?"

        - phase_id: "PH07_market_sizing"
          sequence: 7
          name: "시장규모 추정 (Multi-method)"
          owner: "numerical_modeler"
          collaborators:
            - role: "structure_analyst"
              responsibility: "구조/가치사슬 컨텍스트 제공"
            - role: "reality_monitor"
              responsibility: "확정 데이터 제공 및 품질 검증"

          activities:
            - "Method 1: Top-down"
            - "Method 2: Bottom-up (Top 플레이어 합산)"
            - "Method 3: Fermi 분해"
            - "Method 4: 유사 시장 비교"
            - "4-Method Convergence (±30% 수렴)"

          outputs:
            - type: "artifact"
              id: "ART-market_size_estimate"
            - type: "assumptions"
              ids:
                - "ASM-total_market"
                - "ASM-bm_shares"

          validation:
            type: "convergence_check"
            criteria:
              - "4가지 방법이 합리적 범위 내 수렴"
              - "±30% 이내"

        - phase_id: "PH08_competition_analysis"
          sequence: 8
          name: "경쟁구조 분석"
          owner: "structure_analyst"

          activities:
            - "경쟁강도 (CR3, HHI)"
            - "교섭력 구조"
            - "거래 구조"
            - "시장집중도"

          outputs:
            - type: "artifact"
              id: "ART-competition_analysis"

        - phase_id: "PH12_mece_validation"
          sequence: 12
          name: "MECE 검증"
          owner: "structure_analyst"

          activities:
            - "모든 분류 MECE 재검증"
            - "합산 검증 (BM별 = 도메인별 = 전체)"

          validation:
            type: "comprehensive_mece"
            all_artifacts:
              - "ART-needs_classification"
              - "ART-domain_classification"
              - "ART-bm_complete_list"

        - phase_id: "PH13_validation_gate"
          sequence: 13
          name: "3명 검증 게이트"
          validators:
            - role: "numerical_modeler"
              checklist:
                - "calculation_logic"
                - "convergence"
            - role: "reality_monitor"
              checklist:
                - "data_reliability"
                - "traceability"
            - role: "structure_analyst"
              checklist:
                - "goal_alignment"
                - "umis_principles"
                - "overall_quality"

          pass_criteria:
            - "모든 검증자 통과"

          fail_action:
            - "해당 Phase 또는 이전 Phase 재수행"

        - phase_id: "PH14_report_generation"
          sequence: 14
          name: "Market Reality Report 작성"
          owner: "structure_analyst"

          inputs:
            - all_artifacts: true

          activities:
            - "Executive Summary 작성"
            - "섹션별 통합"
            - "추적성 완성 (SRC-/EST-/ASM- ID)"

          outputs:
            - type: "final_report"
              id: "RPT-market_reality"
              format: "markdown"
              template: "market_reality_report_template"

    opportunity_discovery:
      workflow_id: "opportunity_discovery"
      role_id: "opportunity_designer"
      mode: "greenfield"
      notes:
        - "향후 v7 Explorer 7-Phase 구조를 참고해 세분화 예정."

    structure_analysis_for_project:
      workflow_id: "structure_analysis_for_project"
      role_id: "structure_analyst"
      mode: "brownfield"
      total_phases: 15
      estimated_duration: "4-6 days"
      notes:
        - "structure_analysis의 Brownfield 버전"
        - "PH00에서 Project Context 설정 후, PH01-PH14 재사용"
        - "시장 구조 + 사용자 현재 위치 + 실행 가능 기회까지 분석"
      
      input_requirements:
        required:
          - "domain_id"
          - "region"
          - "focal_actor_info (조직 현황)"
        optional:
          - "internal_data_sources (ERP/CRM/재무)"
          - "existing_project_context_id (업데이트 시)"

      phases:
        - phase_id: "PH00_project_context_setup"
          sequence: 0
          name: "프로젝트 컨텍스트 설정"
          owner: "structure_analyst"
          duration: "2-4 hours"
          new_in_brownfield: true

          inputs:
            - type: "user_input"
              content: "조직/프로젝트 현황 인터뷰 또는 구조화된 폼"
              required_fields:
                - "조직 기본 정보 (이름, 업종, 규모)"
                - "현재 사업 현황 (매출, 고객, 채널)"
                - "보유 역량/자산 (기술, 브랜드, 조직, 데이터)"
                - "제약 조건 (예산, 타임라인, 규제)"
                - "선호 사항 (성장 vs 수익, 리스크 성향)"
                - "프로젝트 목적 (진입/확장/pivot/이해)"
            
            - type: "internal_data"
              content: "내부 시스템 데이터 (선택적)"
              examples:
                - "ERP 매출/원가 데이터"
                - "CRM 고객 데이터"
                - "재무제표"
                - "조직도/인력 현황"
            
            - type: "existing_project_context"
              content: "이전 버전 Project Context (업데이트 시)"
              required: false

          activities:
            - activity_id: "ACT-001"
              name: "조직 현황 구조화"
              description: "인터뷰/폼 입력을 baseline_state/assets/constraints로 변환"
              tools:
                - "구조화 템플릿"
                - "capability_traits 매핑 가이드"
            
            - activity_id: "ACT-002"
              name: "내부 데이터 수집"
              description: "Reality Monitor와 협업하여 내부 Evidence 수집"
              collaboration:
                protocol: "data_collection_request"
                to_role: "reality_monitor"
                request_type: "internal_data"
              
            - activity_id: "ACT-003"
              name: "Evidence 정규화 및 저장"
              description: "내부 데이터를 Evidence Store에 저장"
              engine: "evidence_engine"
              output:
                evidence_ids: "EVD-internal-*"
                source_tier: "curated_internal"
            
            - activity_id: "ACT-004"
              name: "focal_actor R-Graph 구성"
              description: "World Engine으로 조직을 Actor 노드로 생성"
              engine: "world_engine"
              api_call: "ingest_evidence"
              output:
                actor_id: "ACT-CLIENT-*"
                related_nodes: "MoneyFlow, State, Contract 등"
            
            - activity_id: "ACT-005"
              name: "baseline Metric 계산"
              description: "현재 상태 핵심 Metric 계산"
              engine: "value_engine"
              api_call: "evaluate_metrics"
              metrics:
                - "MET-Revenue (current)"
                - "MET-N_customers (current)"
                - "MET-Gross_margin (current)"
                - "MET-Operating_margin (current)"
            
            - activity_id: "ACT-006"
              name: "Project Context 객체 생성"
              description: "모든 정보를 project_context_store에 저장"
              output:
                project_context_id: "PRJ-*"

          outputs:
            - type: "project_context"
              id: "PRJ-*"
              store_ref: "substrate_plane.stores.project_context_store"
            
            - type: "r_graph_extension"
              content: "focal_actor Actor 노드 및 관련 서브그래프"
              node_ids: ["ACT-CLIENT-*", "MFL-*", "STA-*"]
            
            - type: "baseline_metrics"
              content: "현재 상태 핵심 Metric ValueRecord"
              value_ids: ["VAL-baseline-*"]
            
            - type: "artifact"
              id: "ART-project_context_summary"
              format: "markdown"
              content: "프로젝트 컨텍스트 요약 (1-2페이지)"

          validation:
            type: "completeness_check"
            criteria:
              - "focal_actor_id가 R-Graph에 존재하는가?"
              - "baseline_state의 핵심 Metric이 계산되었는가?"
              - "hard_constraints에 Evidence 연결 확인"
              - "capability_traits가 Trait 스키마를 따르는가?"

          success_criteria:
            - "project_context_id 생성 완료"
            - "focal_actor R-Graph 구성 완료"
            - "baseline Metric 3개 이상 계산"

          fail_action:
            - "필수 정보 부족 시 사용자 재확인"
            - "내부 데이터 접근 불가 시 수동 입력 대체"

        - phase_id: "PH01-PH14_reuse"
          sequence: "1-14"
          name: "기존 structure_analysis Phase 재사용"
          notes:
            - "PH01~PH14는 기존 structure_analysis와 동일"
            - "차이점: 모든 Engine 호출 시 project_context_id 전달"
            - "PatternEngine: structure_fit + execution_fit 모두 계산"
            - "ValueEngine: market-level + project-level Metric 모두 계산"
            - "최종 리포트: 시장 구조 + focal_actor 포지션/기회 포함"

