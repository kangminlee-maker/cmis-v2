name: LLM Benchmarks (unit)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  llm-unit-bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LLM unit tests
        run: |
          python -m pytest dev/tests/unit/test_llm_*.py -q

      - name: Run benchmark smoke suite (mock)
        run: |
          python -m cmis_cli llm benchmark run --suite evidence_extraction_unit_smoke --llm-mode mock --fail-on-regression --project-root .


