          threshold:
            min_offline_revenue_retention: 0.90
          evidence_id: null
          notes: "오프라인 매출 10% 이상 감소 불가"

        - constraint_id: "CNS-103"
          type: "temporal"
          description: "3년 내 손익 방어 (적자 전환 불가)"
          threshold:
            max_years_to_profitability: 0
            current_profitability: "positive"
          evidence_id: "EVD-internal-financial-statement-2024"

        - constraint_id: "CNS-104"
          type: "organizational"
          description: "기존 강사 조직 대규모 구조조정 불가"
          threshold:
            max_layoff_ratio: 0.05
          evidence_id: null
          notes: "노조 존재, 대량 해고 시 분쟁 위험"

    preference_profile:
