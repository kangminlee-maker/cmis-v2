          evidence_id: "EVD-internal-instructor-db-001"
          description: "정규 강사 300명 + 시간강사 500명"

        - capability_id: "CAP-103"
          name: "브랜드 인지도"
          trait_set:
            domain_expertise: "education"
            geographic_coverage: "national"
            maturity_level: "industry_leading"
          evidence_id: "EVD-external-brand-survey-001"
          description: "어학원 브랜드 인지도 Top 3"

        - capability_id: "CAP-104"
          name: "디지털 인프라 (제한적)"
          trait_set:
            technology_domain: "web_development"
            maturity_level: "early"
            deployment_type: "on_premise"
            scale_tier: "startup_scale"
          evidence_id: null
          description: "기본 웹사이트 + 간단한 LMS, 모바일 앱 없음"

      channels:
        - channel_id: "CHN-101"
          channel_type: "offline"
          reach: 120
          unit: "branches"
          description: "전국 120개 지점"

        - channel_id: "CHN-102"
          channel_type: "online"
          reach: 5000
          unit: "monthly_visitors"
          description: "웹사이트 (정보성, 거래 미미)"

      brand_assets:
        brand_awareness_level: "high"
        brand_domains: ["adult_language_education"]
        brand_equity_estimate: "500억원 (추정)"

      organizational_assets:
        team_size: 450
        key_talent:
          - role: "교육본부장"
            count: 1
          - role: "지점장"
            count: 120
          - role: "정규 강사"
            count: 300
        org_maturity: "established"
        org_culture: "offline_first, 보수적"

      data_assets:
        customer_data_volume: 45000
        customer_db_quality: "medium"
        proprietary_datasets:
          - "15년치 수강생 데이터"
          - "지점별 성과 데이터"

