        - capability_id: "CAP-002"
          name: "교육 콘텐츠 설계 경험"
          trait_set:
            domain_expertise: "education"
            content_type: "curriculum"
            maturity_level: "mvp"
            language_coverage: ["korean"]
          evidence_id: null
          description: "창업팀 중 1명이 어학교육 커리큘럼 설계 5년 경력"

      channels:
        - channel_id: "CHN-001"
          channel_type: "online"
          reach: 0
          status: "planned"
          description: "모바일 앱 + 웹 플랫폼 계획"

      brand_assets:
        brand_awareness_level: "none"
        brand_domains: []
        notes: "신규 브랜드, 인지도 없음"

      organizational_assets:
        team_size: 3
        key_talent:
          - role: "CTO"
            background: "AI/ML 엔지니어, 음성인식 스타트업 5년"
          - role: "CEO"
            background: "EdTech PM 경력 3년"
          - role: "Content Designer"
            background: "어학교육 커리큘럼 설계 5년"
        org_maturity: "startup"

      data_assets:
        customer_data_volume: 0
        proprietary_datasets: []

    constraints_profile:
      hard_constraints:
        - constraint_id: "CNS-001"
          type: "financial"
          description: "초기 투자 5억원 이내"
          threshold:
            max_initial_investment: 500000000
            currency: "KRW"
          evidence_id: "EVD-internal-investment-agreement-001"

        - constraint_id: "CNS-002"
          type: "temporal"
          description: "6개월 내 MVP 출시"
          threshold:
            mvp_deadline: "2026-06-01"
          evidence_id: null

        - constraint_id: "CNS-003"
          type: "organizational"
          description: "팀 규모 10명 이하 유지 (1년차)"
          threshold:
            max_team_size: 10
            period: "year_1"
          evidence_id: null

        - constraint_id: "CNS-004"
          type: "technical"
          description: "모바일 우선 전략 (오프라인 불가)"
          threshold:
            delivery_channel: ["online"]
          evidence_id: null

    preference_profile:
      soft_preferences:
        - preference_id: "PREF-001"
          dimension: "strategic_priority"
          value: "growth_oriented"
          weight: 0.8
          description: "초기 3년은 성장 우선, 수익은 부차적"

        - preference_id: "PREF-002"
          dimension: "target_customer"
          value:
            preferred: ["office_worker", "professional"]
            avoid: ["student", "retiree"]
          weight: 0.6
          description: "구매력 있는 직장인 타겟 선호"

        - preference_id: "PREF-003"
          dimension: "pricing_model"
          value: "subscription"
          weight: 0.7
          description: "구독형 수익 모델 선호"

        - preference_id: "PREF-004"
          dimension: "market_positioning"
          value: "premium_niche"
          weight: 0.5
          description: "프리미엄 니치 포지셔닝 선호"

    intent:
      goal_type: "market_entry"
      primary_goal_ids:
        - "GOL-EdTech-Startup-Entry-001"
      risk_tolerance: "balanced"
      description: "한국 성인 어학교육 시장 진입, AI 기반 차별화"

    related_goal_ids:
      - "GOL-EdTech-Startup-Entry-001"

    metadata:
      project_name: "AI Voice Coach 한국 시장 진입"
      owner: "CEO"
      created_at: "2025-12-05T10:00:00"
      team_email: "team@edtech-startup.com"

    lineage:
      from_evidence_ids:
