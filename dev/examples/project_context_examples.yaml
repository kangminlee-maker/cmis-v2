      risk_tolerance: "conservative"
      description: "기존 오프라인 사업 방어하며 점진적 디지털 확장"

    related_goal_ids:
      - "GOL-OfflineAcademy-Digital-Expansion-001"

    metadata:
      project_name: "XYZ어학원 디지털 전환 프로젝트"
      company_size: "중견기업 (450명)"
      established_year: 2008
      owner: "경영기획실장"
      created_at: "2025-12-05T11:00:00"

    lineage:
      from_evidence_ids:
