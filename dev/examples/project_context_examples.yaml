examples:

  # ========================================
  # 예시 1: Greenfield - EdTech 스타트업 (AI 음성 기술)
  # ========================================
  - focal_actor_context_id: "PRJ-20251205-EdTech-Startup-001"
    example_name: "AI 음성 기반 어학교육 스타트업 (Greenfield)"
    version: 1
    previous_version_id: null

    focal_actor_id: "ACT-CLIENT-EdTech-Startup-001"

    mode: "greenfield"

    scope:
      domain_id: "Adult_Language_Education_KR"
      region: "KR"
      segment: "office_worker_english"
      time_horizon: "3_years"

    baseline_state:
      as_of: "2025-12-05"
      current_revenue:
        amount: 0
        currency: "KRW"
        per: "year"
      current_customers: 0
      channel_mix: {}
      margin_structure: {}
      key_metrics: []
      evidence_ids: []
      notes:
        - "신규 창업, 사업 시작 전"
        - "제품 MVP 개발 중"

    assets_profile:
