        - preference_id: "PREF-101"
          dimension: "strategic_priority"
          value: "cash_flow_stability"
          weight: 0.9
          description: "안정적 현금흐름 최우선 (성장보다)"

        - preference_id: "PREF-102"
          dimension: "transformation_pace"
          value: "gradual"
          weight: 0.8
          description: "점진적 디지털 전환 선호"

        - preference_id: "PREF-103"
          dimension: "asset_utilization"
          value: "maximize_existing_offline"
          weight: 0.7
          description: "기존 오프라인 자산 활용 극대화"

        - preference_id: "PREF-104"
          dimension: "market_positioning"
          value: "maintain_premium_offline"
          weight: 0.6
          description: "오프라인 프리미엄 포지션 유지"

    intent:
