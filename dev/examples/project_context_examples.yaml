      from_value_ids: []
      from_pattern_ids: []
      from_program_id: "PH00_project_context_setup"
      engine_ids: ["world_engine", "evidence_engine"]
      policy_id: null
      created_by_role: "structure_analyst"
      created_at: "2025-12-05T10:00:00"

  # ========================================
  # 예시 2: Brownfield - 기존 오프라인 학원 체인
