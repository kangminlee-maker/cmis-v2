      engine_ids: ["world_engine", "evidence_engine", "value_engine"]
      policy_id: "decision_balanced"
      created_by_role: "structure_analyst"
      created_at: "2025-12-05T12:00:00"

# ========================================
# 예시 사용법
# ========================================
usage_examples:

  example_1_greenfield:
    description: "Greenfield 스타트업이 시장 진입 기회 평가"
    code: |
      # Step 1: Project Context 생성 (PH00)
      project_context = create_project_context(
          focal_actor_info=greenfield_startup_info,
          domain_id="Adult_Language_Education_KR"
      )
      # → PRJ-20251205-EdTech-Startup-001

      # Step 2: 구조 분석 (PH01-PH14 with project_context)
      market_report = structure_analysis_for_project(
          domain_id="Adult_Language_Education_KR",
          focal_actor_context_id="PRJ-20251205-EdTech-Startup-001"
      )
      # → 시장 구조 + "우리가 실행 가능한 기회" 포함

      # Step 3: 기회 발굴
      opportunities = opportunity_discovery_for_project(
          domain_id="Adult_Language_Education_KR",
          focal_actor_context_id="PRJ-20251205-EdTech-Startup-001"
      )
      # → OPP 카드 (structure_fit + execution_fit 모두 표시)

  example_2_brownfield:
    description: "기존 오프라인 학원이 디지털 전환 전략 수립"
    code: |
      # Step 1: Project Context 생성 (내부 데이터 포함)
      project_context = create_project_context(
          focal_actor_info=offline_academy_info,
          internal_data_sources=[
              "EVD-internal-financial-statement-2024",
              "EVD-internal-crm-export-2024"
          ],
          domain_id="Adult_Language_Education_KR"
      )
      # → PRJ-20251205-OfflineAcademy-Chain-001

      # Step 2: 구조 분석
      market_report = structure_analysis_for_project(
          domain_id="Adult_Language_Education_KR",
          focal_actor_context_id="PRJ-20251205-OfflineAcademy-Chain-001"
      )
      # → "기존 오프라인 자산 활용" 관점 강조

      # Step 3: 전략 설계
      strategies = strategy_design_for_project(
          goal_id="GOL-OfflineAcademy-Digital-Expansion-001",
          focal_actor_context_id="PRJ-20251205-OfflineAcademy-Chain-001"
      )
      # → 점진적 디지털화 전략 (오프라인 방어 + 하이브리드)

  example_3_hybrid:
    description: "글로벌 플랫폼이 한국 진입 평가"
    code: |
      # Step 1: Project Context 생성 (글로벌 baseline 포함)
      project_context = create_project_context(
          focal_actor_info=global_platform_info,
          existing_baseline={
              "global_revenue": 500억원,
              "global_arpu": 100000,
              "proven_playbook": "5개국 성공"
          },
          domain_id="Adult_Language_Education_KR"
      )
      # → PRJ-20251205-Global-Platform-KR-Entry-001

      # Step 2: 기회 발굴
      opportunities = opportunity_discovery_for_project(
          domain_id="Adult_Language_Education_KR",
          focal_actor_context_id="PRJ-20251205-Global-Platform-KR-Entry-001"
      )
      # → "글로벌 성공 패턴" Prior 활용
      # → execution_fit: 플랫폼 기술 (0.9), 한국 시장 이해 (0.3)

      # Step 3: 전략 설계
      strategies = strategy_design_for_project(
          goal_id="GOL-Global-Platform-KR-Entry-001",
          focal_actor_context_id="PRJ-20251205-Global-Platform-KR-Entry-001"
      )
      # → 현지화 전략 + 파트너십 전략 조합

# ========================================
# 검증 체크리스트
# ========================================
validation_checklist:
  project_context_quality:
    - check: "focal_actor_id가 R-Graph에 존재하는가?"
      method: "world_engine.get_node(focal_actor_id)"

    - check: "baseline_state의 핵심 Metric이 Evidence 기반인가?"
      method: "모든 key_metrics에 evidence_ids 연결 확인"

    - check: "capability_traits가 Trait 스키마를 따르는가?"
      method: "각 trait_set이 ontology.traits.capability_traits 정의와 일치 확인"

    - check: "hard_constraints에 Evidence 또는 명확한 근거가 있는가?"
      method: "type=financial/regulatory인 제약은 evidence_id 필수"

    - check: "mode(greenfield/brownfield/hybrid)가 baseline_state와 일치하는가?"
      method: |
        - greenfield: current_revenue == 0
        - brownfield: current_revenue > 0 AND 동일 domain
        - hybrid: current_revenue > 0 BUT 다른 domain/region

  philosophical_alignment:
    - check: "Model-first: baseline이 모델로 표현되었는가?"
      pass_criteria: "숫자만 나열 ❌, 구조적 표현 ✅"

    - check: "Evidence-first: baseline/constraints에 Evidence 있는가?"
      pass_criteria: "evidence_ids 연결 또는 source 명시"

    - check: "Trait 기반: capability가 Trait 조합인가?"
      pass_criteria: "문자열 리스트 ❌, trait_set ✅"
