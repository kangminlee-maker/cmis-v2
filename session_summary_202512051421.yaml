      - "Phase 단위 WorkflowExecutor, AgentCollaborationHub, ValidationGateEngine 등 Gap 리포트 예시 코드."
      - "Market Reality Report / Opportunity Card 자동 생성(Output Format 스키마 기반)."

  recommended_next_steps:
    short_term:
