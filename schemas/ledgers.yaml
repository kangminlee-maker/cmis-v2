---
# CMIS Ledgers Schema
# Project Ledger: project-level state view (index/pointer to Substrate)
# - NOTE: Magentic-One의 "Task Ledger"(문제공간 작업기억)와 동일 계열 개념이지만,
#   CMIS에서는 실행 단위 task/workflow step과의 혼선을 피하기 위해 "Project Ledger"를 정식 용어로 사용합니다.
# Progress Ledger: process control panel (steps/status/budgets/stalls)

ledgers:
  project_ledger:
    description: "프로젝트 상태 뷰(Project Ledger)"
    purpose: "Substrate(Evidence/Value/Graph/Artifacts) 참조 집합"
    stored_in: "substrate_plane.stores.ledger_store"

    fields:
      facts:
        type: "dict"
        description: "확정 사실 (domain_id, region, 시장 정의 등)"
      assumptions:
        type: "list[string]"
        description: "명시적 가정 목록"
      goal_graph:
        type: "dict"
        description: "Goal graph view (what) - 최소 Phase 1에서는 goal 노드 1개로 시작"
      success_predicates:
        type: "list[dict]"
        description: "성공 조건(검증 가능한 predicate) 목록"
      scope:
        type: "dict"
        description: "분석/실행 스코프 (domain_id/region/segment/as_of 등)"
      constraints:
        type: "dict"
        description: "제약/예산/운영 모드 (budgets, run_mode 등)"
      evidence_plan:
        type: "dict"
        description: "Evidence 수집/검증 계획 (required_metrics 등)"
      open_questions:
        type: "list[string]"
        description: "열린 질문/불확실성 목록"
      evidence_refs:
        type: "list[evidence_id]"
        description: "수집된 Evidence ID 목록"
      value_refs:
        type: "list[value_id]"
        description: "생성된 Value ID 목록"
      metrics:
        type: "dict[metric_id, metric_record]"
        description: "metric_id → 계산/검증 결과 묶음"
        schema:
          value_record: "object (value_engine output)"
          metric_eval: "object (metric evaluation output)"
          policy_check: "object (policy gate result)"
          evidence_summary: "object (evidence summary)"
      artifact_refs:
        type: "list[artifact_id]"
        description: "생성된 Artifact ID 목록"
      last_workflow_result:
        type: "object (optional)"
        description: "가장 최근 workflow 실행 결과 스냅샷 (best-effort)"

  progress_ledger:
    description: "프로세스 제어판(Progress Ledger)"
    purpose: "실행 단계/상태/스톨 감지/예산/재계획 기록"
    stored_in: "substrate_plane.stores.ledger_store"

    fields:
      run_id:
        type: "run_id"
        description: "실행 단위 ID"
      role_id:
        type: "role_id"
        description: "실행 역할"
      policy_id:
        type: "policy_id"
        description: "적용 정책 ID"
      interface_id:
        type: "interface_id"
        description: "호출 인터페이스 (cli/api/cursor)"
      workflow_id:
        type: "workflow_id (optional)"
        description: "실행 중인 workflow"
      overall_status:
        type: "enum"
        values: ["running", "completed", "failed", "stalled"]
        description: "전체 상태"
      step_index:
        type: "int"
        description: "현재/마지막 step 인덱스 (1-based, steps 길이와 동일)"
      step_status:
        type: "string"
        description: "현재/마지막 step 상태 (running/completed/failed 등)"
      steps:
        type: "list[step_record]"
        description: "step 실행 이력"
        schema:
          step_id: "string"
          call: "string"
          status: "pending | running | completed | failed"
          started_at: "datetime"
          completed_at: "datetime (optional)"
          result_ref: "string (optional)"
          error: "string (optional)"
      task_statuses:
        type: "dict[task_id, status]"
        description: "task_id → status"
      stall_count:
        type: "int"
        description: "스톨 카운트(집계)"
      stall_counters:
        type: "dict[string, int]"
        description: "스톨 카운터"
      loop_flags:
        type: "dict[string, bool]"
        description: "루프/순환 감지 플래그"
      last_engine_calls:
        type: "list[dict]"
        description: "최근 엔진 호출 요약 (best-effort)"
      last_tool_calls:
        type: "list[dict]"
        description: "최근 Tool 호출 요약 (best-effort)"
      diff_reports:
        type: "list[dict]"
        description: "Verifier diff report 누적"
      next_step_suggestion:
        type: "dict (optional)"
        description: "다음 스텝 제안(재계획/중단 사유 등)"
      budgets:
        type: "dict"
        description: "예산 사용 현황"
        schema:
          time_spent_sec: "float"
          llm_calls: "int"
      replanning_count:
        type: "int"
        description: "재계획 횟수"
      created_at:
        type: "datetime"
        description: "생성 시각(UTC ISO8601)"
      updated_at:
        type: "datetime"
        description: "마지막 업데이트 시각(UTC ISO8601)"
