# CMIS v2 Ontology - Single Source of Truth
# Schema defined by ARCHITECTURE_DECISION.md, Decision 9
# All code in cmis_v2/generated/ is auto-generated from this file.

ontology:
  version: "1.0.0"

  # ---------------------------------------------------------------------------
  # Node Types
  # ---------------------------------------------------------------------------
  node_types:
    actor:
      description: "시장 참여자 (기업, 기관, 개인 등)"
      required_traits:
        - kind
      optional_traits:
        - institution_type
        - market_position
        - value_chain_position
        - scale_tier
        - switching_cost
        - inventory_risk
        - marginal_cost_profile
        - outsourcing_ratio
        - market_focus
        - specialization_level
        - specialization_focus

    money_flow:
      description: "참여자 간 금전 흐름 (수익 모델, 결제 구조)"
      required_traits:
        - revenue_model
      optional_traits:
        - pricing_model
        - payment_recurs
        - recurrence

    state:
      description: "시장/참여자의 관측 가능 상태 (시점별 스냅샷)"
      required_traits: []
      optional_traits:
        - observation_date
        - confidence_level

    product:
      description: "시장에서 거래되는 제품 또는 서비스"
      required_traits: []
      optional_traits:
        - category
        - lifecycle_stage
        - differentiation
        - delivery_model
        - switching_cost
        - pricing_model

    segment:
      description: "시장 세그먼트 (고객군, 지역, 산업 등)"
      required_traits: []
      optional_traits:
        - segment_type
        - segment_size_tier
        - growth_potential
        - price_sensitivity
        - geographic_scope

  # ---------------------------------------------------------------------------
  # Edge Types
  # ---------------------------------------------------------------------------
  edge_types:
    actor_pays_actor:
      description: "참여자 간 결제 관계"
      source: actor
      target: actor
      via: money_flow

    actor_competes_with:
      description: "참여자 간 경쟁 관계"
      source: actor
      target: actor

    actor_serves_actor:
      description: "참여자 간 공급-수요 관계 (서비스 제공)"
      source: actor
      target: actor

    actor_supplies_actor:
      description: "참여자 간 공급망 관계 (원재료/부품)"
      source: actor
      target: actor

    actor_regulates_actor:
      description: "규제 기관과 피규제 참여자 간 관계"
      source: actor
      target: actor

    money_flow_connects:
      description: "금전 흐름이 연결하는 참여자 쌍"
      source: money_flow
      target: actor

    actor_offers_product:
      description: "참여자가 제공하는 제품/서비스"
      source: actor
      target: product

    product_targets_segment:
      description: "제품/서비스가 타겟하는 시장 세그먼트"
      source: product
      target: segment

    actor_belongs_to_segment:
      description: "참여자가 속한 시장 세그먼트"
      source: actor
      target: segment

    product_competes_with:
      description: "제품/서비스 간 경쟁 관계"
      source: product
      target: product

  # ---------------------------------------------------------------------------
  # Trait Definitions
  # ---------------------------------------------------------------------------
  trait_definitions:
    kind:
      type: enum
      description: "시장 참여 주체 또는 주요 자원 유형. 주체(company~ngo)와 산출물 유형(digital_service, physical_product) 구분. 산출물 유형 상세는 product 노드의 category trait 참조"
      values:
        # 주체 유형 (entity)
        - company
        - individual
        - government
        - ngo
        # 산출물/서비스 유형 (offering) — actor의 주요 제공 형태
        - digital_service
        - physical_product
      used_by:
        - actor

    institution_type:
      type: enum
      description: "기관 유형 (온라인 플랫폼, 마켓플레이스 등)"
      values:
        - online_platform
        - marketplace
        - brick_and_mortar
        - hybrid
        - financial_institution
        - educational_institution
        - government_agency
      used_by:
        - actor

    market_position:
      type: enum
      description: "시장 내 경쟁 포지션"
      values:
        - leader
        - challenger
        - follower
        - niche
      used_by:
        - actor

    value_chain_position:
      type: enum
      description: "가치사슬 내 위치"
      values:
        - upstream
        - midstream
        - downstream
      used_by:
        - actor

    scale_tier:
      type: enum
      description: "사업 규모 단계"
      values:
        - startup
        - growth_stage
        - enterprise
        - hyperscale
      used_by:
        - actor

    switching_cost:
      type: enum
      description: "고객 전환 비용 수준"
      values:
        - low
        - medium
        - high
      used_by:
        - actor
        - product

    inventory_risk:
      type: enum
      description: "재고 보유 리스크 수준"
      values:
        - low
        - medium
        - high
      used_by:
        - actor

    marginal_cost_profile:
      type: enum
      description: "한계 비용 구조"
      values:
        - low
        - medium
        - high
      used_by:
        - actor

    outsourcing_ratio:
      type: enum
      description: "외주 비율 수준"
      values:
        - low
        - medium
        - high
      used_by:
        - actor

    market_focus:
      type: enum
      description: "시장 집중 전략"
      values:
        - broad
        - niche
      used_by:
        - actor

    specialization_level:
      type: enum
      description: "전문화 수준"
      values:
        - low
        - medium
        - high
      used_by:
        - actor

    specialization_focus:
      type: enum
      description: "전문화 방향"
      values:
        - horizontal
        - vertical
      used_by:
        - actor

    revenue_model:
      type: enum
      description: "수익 모델 유형"
      values:
        - subscription
        - one_off
        - usage_based
        - commission
        - advertising
        - licensing
        - freemium
      used_by:
        - money_flow

    pricing_model:
      type: enum
      description: "가격 책정 모델"
      values:
        - flat_rate
        - tiered
        - usage_based
        - freemium
        - free_trial
        - dynamic
        - auction
      used_by:
        - money_flow
        - product

    payment_recurs:
      type: boolean
      description: "결제 반복 여부"
      used_by:
        - money_flow

    recurrence:
      type: enum
      description: "결제 반복 주기"
      values:
        - monthly
        - quarterly
        - yearly
      used_by:
        - money_flow

    observation_date:
      type: string
      description: "관측 일자 (ISO 8601)"
      used_by:
        - state

    confidence_level:
      type: number
      description: "관측 신뢰도 (0.0 ~ 1.0)"
      used_by:
        - state
      bounds:
        min: 0.0
        max: 1.0

    category:
      type: enum
      description: "제품/서비스 카테고리"
      values:
        - physical_good
        - digital_service
        - saas
        - marketplace
        - content
        - infrastructure
      used_by:
        - product

    lifecycle_stage:
      type: enum
      description: "제품 수명 주기 단계"
      values:
        - introduction
        - growth
        - maturity
        - decline
      used_by:
        - product

    differentiation:
      type: enum
      description: "차별화 전략"
      values:
        - cost_leadership
        - differentiation
        - niche
      used_by:
        - product

    delivery_model:
      type: enum
      description: "제품/서비스 전달 방식"
      values:
        - direct
        - platform
        - franchise
        - partnership
        - self_service
      used_by:
        - product

    segment_type:
      type: enum
      description: "세그먼트 유형"
      values:
        - b2b
        - b2c
        - b2b2c
        - b2g
      used_by:
        - segment

    segment_size_tier:
      type: enum
      description: "세그먼트 규모 단계"
      values:
        - micro
        - small
        - medium
        - large
        - massive
      used_by:
        - segment

    growth_potential:
      type: enum
      description: "성장 잠재력"
      values:
        - declining
        - stable
        - moderate
        - high
        - explosive
      used_by:
        - segment

    price_sensitivity:
      type: enum
      description: "가격 민감도"
      values:
        - low
        - medium
        - high
      used_by:
        - segment

    geographic_scope:
      type: enum
      description: "지리적 범위"
      values:
        - local
        - regional
        - national
        - international
        - global
      used_by:
        - segment

  # ---------------------------------------------------------------------------
  # Metrics
  # ---------------------------------------------------------------------------
  metrics:
    MET-N_customers:
      description: "목표 고객 수"
      unit: count
      aggregation: sum
      distribution_type: lognormal
      required_evidence_tier:
        - official_statistics
        - industry_reports
        - company_filings

    MET-Revenue:
      description: "연간 매출"
      unit: currency
      aggregation: sum
      distribution_type: lognormal
      required_evidence_tier:
        - company_filings
        - official_statistics
        - industry_reports

    MET-Avg_price_per_unit:
      description: "평균 단가 (매출 / 고객 수)"
      unit: currency
      aggregation: weighted_average
      distribution_type: lognormal

    MET-TAM:
      description: "총 시장 규모 (Total Addressable Market)"
      unit: currency
      aggregation: latest
      distribution_type: lognormal

    MET-SAM:
      description: "유효 시장 규모 (Serviceable Available Market)"
      unit: currency
      aggregation: latest
      distribution_type: lognormal

    MET-SOM:
      description: "수익 가능 시장 규모 (Serviceable Obtainable Market)"
      unit: currency
      aggregation: latest
      distribution_type: lognormal

    MET-Churn_rate:
      description: "고객 이탈률"
      unit: ratio
      aggregation: weighted_average
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-Gross_margin:
      description: "매출 총이익률"
      unit: ratio
      aggregation: weighted_average
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-LTV:
      description: "고객 생애 가치 (Lifetime Value)"
      unit: currency
      aggregation: weighted_average
      distribution_type: lognormal

    MET-CAC:
      description: "고객 획득 비용 (Customer Acquisition Cost)"
      unit: currency
      aggregation: weighted_average
      distribution_type: lognormal

    MET-Payback_period:
      description: "CAC 회수 기간 (개월)"
      unit: count
      aggregation: weighted_average
      distribution_type: lognormal

    MET-ARPU:
      description: "사용자당 평균 매출 (Average Revenue Per User)"
      unit: currency
      aggregation: weighted_average
      distribution_type: lognormal

    MET-HHI_revenue:
      description: "허핀달-허쉬만 지수 (매출 기준 시장 집중도)"
      unit: index
      aggregation: latest
      bounds:
        min: 0
        max: 10000
      distribution_type: beta

    MET-Top3_revenue_share:
      description: "상위 3개 기업 매출 점유율 합계"
      unit: ratio
      aggregation: latest
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-Top5_revenue_share:
      description: "상위 5개 기업 매출 점유율 합계"
      unit: ratio
      aggregation: latest
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-Platform_commission_fees:
      description: "플랫폼 수수료 수익"
      unit: currency
      aggregation: sum
      distribution_type: lognormal

    MET-CapEx:
      description: "자본 지출 (Capital Expenditure)"
      unit: currency
      aggregation: sum
      distribution_type: lognormal

    MET-Operating_margin:
      description: "영업이익률"
      unit: ratio
      aggregation: weighted_average
      bounds:
        min: -1.0
        max: 1.0
      distribution_type: beta

    MET-COGS:
      description: "매출원가 (Cost of Goods Sold)"
      unit: currency
      aggregation: sum
      distribution_type: lognormal

    MET-OPEX:
      description: "운영비 (Operating Expenditure)"
      unit: currency
      aggregation: sum
      distribution_type: lognormal

    MET-Royalty_expenses:
      description: "로열티 비용"
      unit: currency
      aggregation: sum
      distribution_type: lognormal

    MET-Market_growth_rate:
      description: "시장 성장률 (연간)"
      unit: percentage
      aggregation: latest
      bounds:
        min: -1.0
        max: 10.0
      distribution_type: beta

    MET-Market_penetration_rate:
      description: "시장 침투율"
      unit: ratio
      aggregation: latest
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-Customer_concentration:
      description: "고객 집중도 (상위 고객 매출 비중)"
      unit: ratio
      aggregation: latest
      bounds:
        min: 0.0
        max: 1.0
      distribution_type: beta

    MET-Net_revenue_retention:
      description: "순 매출 유지율 (기존 고객 기반)"
      unit: ratio
      aggregation: latest
      bounds:
        min: 0.0
        max: 3.0
      distribution_type: beta

  # ---------------------------------------------------------------------------
  # Metric Relations (Constraint Propagation 입력)
  # ---------------------------------------------------------------------------
  # type: identity — 등식 관계. formula로 역방향 계산 가능.
  # type: inequality — 부등식 관계. 구간 축소에 사용.
  # 변수명은 반드시 위 metrics 섹션에 정의된 ID를 사용.

  metric_relations:
    # 수익 분해: Revenue = N_customers × ARPU
    - type: identity
      formula: "MET-Revenue = MET-N_customers * MET-ARPU"
      variables: ["MET-Revenue", "MET-N_customers", "MET-ARPU"]

    # 평균 단가: Avg_price = Revenue / N_customers
    - type: identity
      formula: "MET-Avg_price_per_unit = MET-Revenue / MET-N_customers"
      variables: ["MET-Avg_price_per_unit", "MET-Revenue", "MET-N_customers"]

    # 시장 규모 계층: TAM >= SAM >= SOM >= 0
    - type: inequality
      constraint: "MET-TAM >= MET-SAM"
      variables: ["MET-TAM", "MET-SAM"]

    - type: inequality
      constraint: "MET-SAM >= MET-SOM"
      variables: ["MET-SAM", "MET-SOM"]

    # 시장 침투: Revenue = TAM × Market_penetration_rate
    - type: identity
      formula: "MET-Revenue = MET-TAM * MET-Market_penetration_rate"
      variables: ["MET-Revenue", "MET-TAM", "MET-Market_penetration_rate"]

    # 고객 생애 가치: LTV = ARPU / Churn_rate
    - type: identity
      formula: "MET-LTV = MET-ARPU / MET-Churn_rate"
      variables: ["MET-LTV", "MET-ARPU", "MET-Churn_rate"]

    # CAC 회수: Payback_period = CAC / ARPU (단위: 개월)
    - type: identity
      formula: "MET-Payback_period = MET-CAC / MET-ARPU"
      variables: ["MET-Payback_period", "MET-CAC", "MET-ARPU"]

    # 매출 총이익: Gross_margin = (Revenue - COGS) / Revenue
    - type: identity
      formula: "MET-Gross_margin = (MET-Revenue - MET-COGS) / MET-Revenue"
      variables: ["MET-Gross_margin", "MET-Revenue", "MET-COGS"]

    # 점유율 순서: Top3 <= Top5
    - type: inequality
      constraint: "MET-Top3_revenue_share <= MET-Top5_revenue_share"
      variables: ["MET-Top3_revenue_share", "MET-Top5_revenue_share"]

  # ---------------------------------------------------------------------------
  # Policy Schema
  # ---------------------------------------------------------------------------
  policy_schema:
    modes:
      - reporting_strict
      - decision_balanced
      - exploration_friendly

    profile_types:
      - evidence
      - value
      - prior
      - convergence
      - orchestration

  # ---------------------------------------------------------------------------
  # Workflow Schema
  # ---------------------------------------------------------------------------
  workflow_schema:
    canonical_workflows:
      - structure_analysis
      - opportunity_discovery
      - strategy_design
      - reality_monitoring

    structure_analysis:
      description: "시장 구조/규모/경쟁 분석"
      keywords:
        - market_structure
        - competition
        - market_size
        - industry_analysis
        - competitive_landscape
      default_policy: reporting_strict

    opportunity_discovery:
      description: "패턴 기반 기회 발굴"
      keywords:
        - opportunity
        - gap_analysis
        - market_entry
        - white_space
        - unmet_needs
      default_policy: exploration_friendly

    strategy_design:
      description: "전략 후보 탐색 및 평가"
      keywords:
        - strategy
        - business_model
        - portfolio
        - go_to_market
        - investment
      default_policy: decision_balanced

    reality_monitoring:
      description: "실적 모니터링 및 학습"
      keywords:
        - monitoring
        - performance
        - tracking
        - learning
        - outcome
      default_policy: reporting_strict
