---
cmis:
  meta:
    version: "3.4.0"
    updated: "2025-12-13"
    status: "blueprint"
    codename: "Evidence-Ledger Graph OS"
    description: >
      CMIS (Contextual Market Intelligence System)는 시장/비즈니스 세계를
      Reality/Pattern/Value/Decision의 Graph-of-Graphs로 표현하고,
      Evidence-first 원칙 하에 Understand → Discover → Decide → Learn 루프를 실행하는
      Market Intelligence OS입니다.
    compatibility:
      derived_from:
        - "CMIS_Architecture_Blueprint_v3.3"
        - "cmis.yaml@v9.0.0-alpha"
      design_intent:
        - "루트 YAML은 '상위 레지스트리/계약(contracts)'만 포함한다."
        - "대형 스펙(ontology/metrics/patterns/workflows/policies)은 외부 YAML로 분리한다."

  philosophy:
    principles:
      - id: "model_first_number_second"
        statement: "세계의 구조(Reality)와 메커니즘(Pattern)이 먼저이며, 숫자(Value)는 그 위의 결과입니다."
        enforced_by:
          - "substrate_plane.graphs.reality_graph"
          - "cognition_plane.engines.pattern_engine"
          - "cognition_plane.engines.strategy_engine"
          - "cognition_plane.engines.value_engine"

      - id: "evidence_first_prior_last"
        statement: "가능한 한 Evidence로 해결하고, Prior/가정은 마지막 수단으로 제한합니다."
        enforced_by:
          - "cognition_plane.engines.policy_engine"
          - "cognition_plane.engines.evidence_engine"
          - "cognition_plane.engines.value_engine.metric_resolver"
          - "orchestration_plane.verifier"

      - id: "single_source_of_truth"
        statement: "모든 산출물은 Store/Graph에 영속화된 ID/Lineage로만 참조되어 재현 가능한 실행을 보장합니다."
        enforced_by:
          - "substrate_plane.single_source_of_truth"
          - "ids_and_lineage"
          - "orchestration_plane.run_audit_log"

      - id: "ledger_based_orchestration"
        statement: "유한 컨텍스트의 한계를 Task/Progress Ledger로 보완하고, 실행/재계획은 Ledger 업데이트로만 제어합니다."
        enforced_by:
          - "orchestration_plane.ledgers.project_ledger"
          - "orchestration_plane.ledgers.progress_ledger"

      - id: "agent_is_persona_plus_workflow"
        statement: "Agent(역할)는 엔진이 아니라 Persona + Workflow + View 제약이며, 엔진 호출/정책 선택을 가이드합니다."
        enforced_by:
          - "role_plane.roles"
          - "orchestration_plane.workflow_binding"

      - id: "deterministic_engines_auditable_llm"
        statement: "엔진은 동일 입력/정책/증거 스냅샷이면 재현되어야 하며, LLM 사용은 모두 로그/스냅샷으로 감사 가능해야 합니다."
        enforced_by:
          - "cognition_plane.engine_contracts"
          - "substrate_plane.stores.run_store"
          - "orchestration_plane.run_audit_log"

      - id: "monotonic_improvability"
        statement: "Outcome 기반 학습으로 품질이 누적 개선되며, 회귀를 자동 감지/차단하는 가드를 둡니다."
        enforced_by:
          - "cognition_plane.engines.learning_engine"
          - "observability.eval_harness"

  modules:
    # 대형 정의는 외부 파일로 분리 (루트 YAML은 'registry' 역할)
    schemas:
      ontology: "schemas/ontology.yaml"
      ledgers: "schemas/ledgers.yaml"
      graphs:
        reality_graph: "schemas/reality_graph.yaml"
        pattern_graph: "schemas/pattern_graph.yaml"
        value_graph: "schemas/value_graph.yaml"
        decision_graph: "schemas/decision_graph.yaml"
    libraries:
      pattern_library: "libraries/patterns/"
      metrics_spec: "libraries/metrics_spec.yaml"
      domain_registry: "libraries/domain_registry.yaml"
      prompts: "libraries/prompt_library.yaml"

    config:
      policies: "config/policies.yaml"
      workflows: "config/workflows.yaml"
      archetypes: "config/archetypes/"
      sources: "config/sources/"

  registries:
    metric_sets:
      structure_core_economics: "libraries/metrics_spec.yaml#metric_sets.structure_core_economics"
      opportunity_additional: "libraries/metrics_spec.yaml#metric_sets.opportunity_additional"
      monitoring_core: "libraries/metrics_spec.yaml#metric_sets.monitoring_core"
    policy_modes:
      reporting_strict: "config/policies.yaml#policy_pack.modes.reporting_strict"
      decision_balanced: "config/policies.yaml#policy_pack.modes.decision_balanced"
      exploration_friendly: "config/policies.yaml#policy_pack.modes.exploration_friendly"

  ids_and_lineage:
    id_prefixes:
      actor: "ACT-"
      event: "EVT-"
      resource: "RES-"
      money_flow: "MFL-"
      contract: "CTR-"
      state: "STA-"
      trait: "TRI-"
      quantity: "QTY-"
      evidence: "EVD-"
      value: "VAL-"
      pattern: "PAT-"
      goal: "GOL-"
      hypothesis: "HYP-"
      strategy: "STR-"
      scenario: "SCN-"
      action: "ACTN-"
      project_context: "PRJ-"
      outcome: "OUT-"
      ledger: "LDG-"
      run: "RUN-"
      artifact: "ART-"
    lineage_schema:
      required_fields:
        - "created_at"
        - "engine_id"
        - "policy_ref"
      optional_fields:
        - "from_run_id"
        - "from_evidence_ids"
        - "from_value_ids"
        - "from_pattern_ids"
        - "from_program_id"
        - "notes"

  planes:
    interaction_plane:
      description: "사람/외부 시스템이 CMIS와 상호작용하는 인터페이스"
      interfaces:
        - id: "cli"
          type: "command_line"
          default_role_id: "structure_analyst"
        - id: "api"
          type: "http"
          default_role_id: "strategy_architect"
        - id: "notebook"
          type: "jupyter"
          default_role_id: "numerical_modeler"
        - id: "web_app"
          type: "web"
          default_role_id: "structure_analyst"
      api_surface:
        public:
          base_path: "/api/v1"
          endpoints:
            - id: "structure_analysis"
              method: "POST"
              path: "/workflows/structure-analysis:run"
            - id: "opportunity_discovery"
              method: "POST"
              path: "/workflows/opportunity-discovery:run"
            - id: "strategy_design"
              method: "POST"
              path: "/workflows/strategy-design:run"
        internal:
          base_path: "/internal/v1"
          endpoints:
            - id: "runs_read"
              method: "GET"
              path: "/runs/{run_id}"
            - id: "ledgers_read"
              method: "GET"
              path: "/runs/{run_id}/ledgers"

    role_plane:
      description: "역할(Agent)은 Persona + Workflow + View 제약이며, 엔진 구현을 포함하지 않습니다"
      roles:
        - id: "structure_analyst"
          label: "Structure Analyst"
          default_policy_mode: "reporting_strict"
          allowed_workflows:
            - "structure_analysis"
            - "compare_contexts"
          allowed_calls:
            - "world_engine.snapshot"
            - "pattern_engine.match_patterns"
            - "value_engine.evaluate_metrics"

        - id: "opportunity_designer"
          label: "Opportunity Designer"
          default_policy_mode: "exploration_friendly"
          allowed_workflows:
            - "opportunity_discovery"
          allowed_calls:
            - "world_engine.snapshot"
            - "pattern_engine.discover_gaps"
            - "value_engine.evaluate_metrics"

        - id: "strategy_architect"
          label: "Strategy Architect"
          default_policy_mode: "decision_balanced"
          allowed_workflows:
            - "strategy_design"
            - "portfolio_evaluation"
          allowed_calls:
            - "strategy_engine.search_strategies"
            - "strategy_engine.evaluate_portfolio"
            - "value_engine.simulate_scenario"

        - id: "numerical_modeler"
          label: "Numerical Modeler"
          default_policy_mode: "reporting_strict"
          allowed_workflows:
            - "metric_deep_dive"
          allowed_calls:
            - "value_engine.evaluate_metrics"

        - id: "reality_monitor"
          label: "Reality Monitor"
          default_policy_mode: "reporting_strict"
          allowed_workflows:
            - "reality_monitoring"
          allowed_calls:
            - "learning_engine.update_from_outcomes"
            - "learning_engine.update_project_context_from_outcome"

      invariants:
        role_cannot_write_stores_directly: true
        role_cannot_bypass_policy_engine: true
        role_is_not_engine: true

    substrate_plane:
      description: "증거/그래프/결과/실행기록의 단일 진실 원천(SSoT)"
      single_source_of_truth:
        rules:
          - "모든 입력/출력은 ID/Ref로만 전달합니다."
          - "원문/원데이터는 evidence_store(및 document_store)에 저장합니다."
          - "정규화/추출/계산 산출물은 별도 객체로 저장하고 lineage로 연결합니다."
          - "핵심 수치/주장은 evidence_id 또는 value_id로 역추적 가능해야 합니다."
        immutability:
          evidence_store: "append_only"
          value_store: "append_only"
          run_store: "append_only"
      stores:
        evidence_store:
          purpose: "원문/원데이터/메타데이터/획득방식 저장"
          backend: "sqlite+object_store"
          retention: "policy_based"
        document_store:
          purpose: "대용량 원문/HTML 스냅샷/첨부파일 저장"
          backend: "object_store"
        graph_store:
          purpose: "R/P/V/D 그래프 저장 및 스냅샷"
          backend: "file_backend_or_graph_db"
        value_store:
          purpose: "ValueRecord(VAL-*) 영속화"
          backend: "sqlite"
        project_context_store:
          purpose: "FocalActorContext(PRJ-*) 버전 관리"
          backend: "sqlite"
        outcome_store:
          purpose: "Outcome(OUT-*) 저장"
          backend: "sqlite"
        ledger_store:
          purpose: "Task/Progress Ledger 영속화 및 리플레이"
          backend: "sqlite"
        artifact_store:
          purpose: "리포트/차트/중간 산출물(ART-*) 저장"
          backend: "object_store"
        run_store:
          purpose: "실행(RUN-*) 감사로그(입력/정책/툴콜/비용/에러)"
          backend: "sqlite"
        cache_store:
          purpose: "단기 캐시"
          backend: "sqlite"
          ttl_hours_default: 24

      graphs:
        reality_graph:
          id: "R"
          store: "graph_store"
          schema_ref: "schemas/reality_graph.yaml"
          snapshot_support:
            as_of: true
            segment: true
            project_overlay: true
        pattern_graph:
          id: "P"
          store: "graph_store"
          schema_ref: "schemas/pattern_graph.yaml"
          library_ref: "libraries/patterns/"
        value_graph:
          id: "V"
          store: "graph_store"
          schema_ref: "schemas/value_graph.yaml"
          metrics_spec_ref: "libraries/metrics_spec.yaml"
        decision_graph:
          id: "D"
          store: "graph_store"
          schema_ref: "schemas/decision_graph.yaml"

    cognition_plane:
      description: "R/P/V/D 위에서 계산·추론·학습을 수행하는 엔진 계층"
      engine_contracts:
        determinism:
          default: "deterministic_given_same_inputs_and_evidence_snapshot"
        input_style:
          all_inputs_are_refs: true
          no_hidden_state_outside_stores: true
        output_style:
          outputs_are_refs_with_lineage: true

      engines:
        policy_engine:
          description: "품질/리스크/증거 우선순위 정책 결정"
          api:
            - name: "resolve_policy"
              input:
                role_id: "role_id"
                usage: "enum[reporting,exploration,decision]"
              output:
                policy_ref: "policy_ref"

        evidence_engine:
          description: "Evidence 수집·정규화·중복제거·스코어링"
          features:
            - "tiered_sources: official > curated > commercial > web"
            - "early_return"
            - "query_expansion"
            - "dedup_and_citation_extraction"
            - "cache_with_ttl"
          api:
            - name: "fetch_for_metrics"
              input:
                metric_requests_ref: "metric_request_set_ref"
                policy_ref: "policy_ref"
              output:
                evidence_bundle_ref: "evidence_bundle_ref"
            - name: "fetch_for_reality_slice"
              input:
                scope: "dict"
                as_of: "date"
                policy_ref: "policy_ref"
              output:
                evidence_bundle_ref: "evidence_bundle_ref"

        world_engine:
          description: "Evidence → Reality Graph 정규화 및 스냅샷/오버레이 제공"
          api:
            - name: "ingest_project_context"
              input:
                project_context_id: "project_context_id"
              output:
                focal_actor_id: "actor_id"
            - name: "ingest_evidence"
              input:
                domain_id: "domain_id"
                evidence_bundle_ref: "evidence_bundle_ref"
              output:
                updated_nodes_ref: "node_id_set_ref"
            - name: "snapshot"
              input:
                domain_id: "domain_id"
                region: "region"
                segment: "segment (optional)"
                as_of: "date_or_latest"
                project_context_id: "project_context_id (optional)"
                policy_ref: "policy_ref"
              output:
                reality_snapshot_ref: "reality_snapshot_ref"

        pattern_engine:
          description: "R-Graph에서 패턴 매칭/갭 탐지"
          api:
            - name: "match_patterns"
              input:
                reality_snapshot_ref: "reality_snapshot_ref"
                project_context_id: "project_context_id (optional)"
              output:
                pattern_match_set_ref: "pattern_match_set_ref"
            - name: "discover_gaps"
              input:
                reality_snapshot_ref: "reality_snapshot_ref"
                project_context_id: "project_context_id (optional)"
              output:
                gap_set_ref: "gap_set_ref"

        value_engine:
          description: "Metric 계산/추론/검증 (Evidence → Derived → Prior → Fusion)"
          metric_resolver:
            stages:
              - id: "evidence"
                uses:
                  - "evidence_engine.fetch_for_metrics"
              - id: "derived"
                uses:
                  - "value_graph.formulas"
                  - "world_engine.snapshot"
              - id: "prior"
                uses:
                  - "belief_engine"
                  - "pattern_engine"
              - id: "fusion_and_validation"
                uses:
                  - "policy_engine"
                  - "orchestration_plane.verifier"
          api:
            - name: "evaluate_metrics"
              input:
                metric_requests_ref: "metric_request_set_ref"
                policy_ref: "policy_ref"
                project_context_id: "project_context_id (optional)"
              output:
                value_bundle_ref: "value_bundle_ref"
            - name: "simulate_scenario"
              input:
                scenario_id: "scenario_id"
                policy_ref: "policy_ref"
                project_context_id: "project_context_id (optional)"
              output:
                value_bundle_ref: "value_bundle_ref"

        strategy_engine:
          description: "Goal/Pattern/Reality/Value 기반 전략 생성/평가"
          api:
            - name: "search_strategies"
              input:
                goal_id: "goal_id"
                project_context_id: "project_context_id (optional)"
                greenfield_constraints_ref: "greenfield_constraints_ref (optional)"
                policy_ref: "policy_ref"
              output:
                strategy_set_ref: "strategy_set_ref"
            - name: "evaluate_portfolio"
              input:
                strategy_ids: "list[strategy_id]"
                goal_id: "goal_id"
                policy_ref: "policy_ref"
                project_context_id: "project_context_id (optional)"
              output:
                portfolio_eval_ref: "portfolio_eval_ref"

        learning_engine:
          description: "Outcome 기반으로 패턴/메트릭/컨텍스트 업데이트"
          api:
            - name: "update_from_outcomes"
              input:
                outcome_ids: "list[outcome_id]"
              output:
                updated_entities_ref: "updated_entities_ref"
            - name: "update_project_context_from_outcome"
              input:
                outcome_id: "outcome_id"
                project_context_id: "project_context_id"
              output:
                new_project_context_id: "project_context_id"

        belief_engine:
          description: "Prior/신념(분포) 관리(증거 약할 때 보조 신호)"
          api:
            - name: "get_prior"
              input:
                key: "string"
                context: "dict"
              output:
                distribution_ref: "distribution_ref"
            - name: "update_from_learning"
              input:
                updates_ref: "dict_ref"
              output:
                status: "ok"

      llm_runtime:
        description: "LLM 호출은 도구로 취급하며, 입력/출력/모델/파라미터를 run_store에 기록합니다"
        providers:
          - id: "openai"
            usage:
              - "planning"
              - "extraction"
              - "summarization"
              - "query_expansion"
        guardrails:
          always_log_prompt_and_response: true
          store_raw_web_snapshots_when_used: true
          no_llm_generated_facts_without_evidence_ids: true

    orchestration_plane:
      description: "엔진을 조합해 목표를 달성하는 상위 실행 계층(동적/검증/재계획)"
      orchestrator:
        id: "cmis_orchestrator"
        run_modes:
          - "batch"
          - "interactive"
          - "approval_required"
        lifecycle:
          - "init_run"
          - "build_project_ledger"
          - "plan_steps"
          - "execute_steps"
          - "verify_and_replan"
          - "publish_artifacts"
          - "archive_run"
        replanning:
          stall_threshold: 2
          triggers:
            - "verifier_failed"
            - "stall_threshold_reached"
            - "new_evidence_arrived"
            - "policy_gate_blocked"
            - "user_constraints_changed"
        concurrency:
          allow_parallel_branches: true
          branch_isolation: "per_goal_node"

      ledgers:
        project_ledger:
          store: "ledger_store"
          schema_ref: "schemas/ledgers.yaml#ledgers.project_ledger"
          contains:
            - "goal_graph"
            - "success_predicates"
            - "scope"
            - "constraints"
            - "evidence_plan"
            - "assumptions"
            - "open_questions"
            - "artifact_refs"
        progress_ledger:
          store: "ledger_store"
          schema_ref: "schemas/ledgers.yaml#ledgers.progress_ledger"
          contains:
            - "step_index"
            - "step_status"
            - "stall_count"
            - "last_engine_calls"
            - "last_tool_calls"
            - "diff_reports"
            - "next_step_suggestion"

      verifier:
        description: "Goal predicate + Evidence/Lineage 기반 검증"
        gates:
          - id: "evidence_lineage_check"
            rule: "핵심 수치/주장은 evidence_id 또는 value_id로 역추적 가능해야 합니다."
          - id: "policy_quality_gate"
            rule: "policy_ref의 quality_profile 요구를 만족해야 합니다."
          - id: "consistency_check"
            rule: "동일 metric/context 내 상충 값은 diff 보고 후 fusion 규칙을 적용합니다."

      tool_and_resource_registry:
        description: "Tool/Environment/Role을 1급 리소스로 등록하고 안전하게 호출합니다"
        tools:
          - id: "web_search"
            class: "tool"
            safety: "restricted"
          - id: "http_fetch"
            class: "tool"
            safety: "restricted"
          - id: "python_runtime"
            class: "tool"
            safety: "sandboxed"
        environments:
          - id: "local"
            class: "environment"
            constraints:
              network_access: "limited"
        agents:
          - id: "structure_analyst"
            class: "role"
          - id: "strategy_architect"
            class: "role"

      workflow_binding:
        description: "Role ↔ Workflow ↔ Policy 모드 기본 바인딩"
        defaults:
          structure_analyst:
            workflow: "structure_analysis"
            policy_mode: "reporting_strict"
          opportunity_designer:
            workflow: "opportunity_discovery"
            policy_mode: "exploration_friendly"
          strategy_architect:
            workflow: "strategy_design"
            policy_mode: "decision_balanced"

      workflow_registry:
        canonical_workflows_ref: "config/workflows.yaml#canonical_workflows"

      run_audit_log:
        record:
          - "inputs"
          - "resolved_policy"
          - "evidence_queries_and_snapshots"
          - "engine_calls_and_refs"
          - "verifier_reports"
          - "cost_and_latency"
          - "errors_and_retries"

  observability:
    logging:
      sinks: ["stdout", "file", "run_store"]
      include_llm_io: true
      include_tool_io: true
    metrics:
      - "run_success_rate"
      - "mean_time_to_result"
      - "evidence_hit_rate"
      - "prior_usage_rate"
      - "verification_failure_rate"
    eval_harness:
      description: "재현 가능한 평가(회귀) 및 품질 가드"
      regression_tests_ref: "eval/regression_suite.yaml"
      canary_domains_ref: "eval/canary_domains.yaml"

  security_and_safety:
    data_handling:
      pii_policy: "no_pii_by_default"
      redaction: "enabled"
    tool_safety:
      network_access: "restricted_by_policy"
      allow_shell: false
    access_control:
      roles: ["admin", "analyst", "viewer"]
