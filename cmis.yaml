        strategy_engine:
          description: "Goal/Pattern/Reality/Value를 바탕으로 전략/포트폴리오 후보 탐색/평가 엔진"
          inputs:
            - "substrate_plane.graphs.reality_graph"
            - "substrate_plane.graphs.pattern_graph"
            - "substrate_plane.graphs.value_graph"
            - "substrate_plane.graphs.decision_graph"
            - "value_engine"
          outputs:
            - "strategy_candidates"
          api:
            - name: "search_strategies"
              description: "Goal/제약을 입력받아 Strategy 후보 세트 생성"
              input:
                goal_id: "goal_id"
                constraints: "dict"
                project_context_id: "project_context_id (optional)"
              output:
                strategy_set_ref: "strategy_set"
              notes:
                - "project_context_id 있으면 constraints_profile.hard_constraints 자동 반영"
                - "preference_profile 기반 전략 랭킹 조정"
                - "execution_fit_score 낮은 전략 필터링/하위 랭킹"
            
            - name: "evaluate_portfolio"
              description: "여러 Strategy를 포트폴리오로 묶어 평가"
              input:
                strategy_ids: "list[strategy_id]"
                policy_ref: "policy_ref"
                project_context_id: "project_context_id (optional)"
              output:
                portfolio_eval_ref: "portfolio_evaluation"
              notes:
                - "project_context_id 있으면 자원(예산/인력) 경쟁 고려"
                - "Cannibalization 리스크 평가"

        learning_engine:
          description: "Outcome과 예상 값을 비교해 Belief/Pattern/Value Graph 업데이트"
          inputs:
            - "substrate_plane.stores.outcome_store"
            - "substrate_plane.graphs.value_graph"
            - "substrate_plane.graphs.pattern_graph"
            - "substrate_plane.stores.project_context_store"
          outputs:
            - "updated_beliefs"
            - "updated_project_contexts"
          api:
            - name: "update_from_outcomes"
              description: "실제 Outcome 기반 Metric/Pattern 분포/Belief 업데이트"
              input:
                outcome_ids: "list[outcome_id]"
              output:
                updated_entities: "dict"
            
            - name: "update_project_context_from_outcome"
              description: "실제 Outcome 기반 Project Context의 baseline/learned_patterns 업데이트"
              input:
                outcome_id: "outcome_id"
                project_context_id: "project_context_id"
              output:
                updated_project_context_version: "project_context_ref"
              notes:
                - "baseline_state 업데이트 (실제 매출/고객 수/Churn 등)"
                - "learned_patterns에 패턴별 실행 성과 기록"
                - "새 버전 project_context 생성 (version += 1)"

        policy_engine:
          description: "Evidence-first, Prior-last, 리스크 허용도 등 정책 관리 및 다른 엔진에 제공"
          policies:
            modes:
              - id: "reporting_strict"
                description: "공식/Evidence 중심, Prior 최소"
                quality_profile_ref: "reporting_strict"
                validation_gates_ref: "cmis_validation_gates.yaml#gate_types"
              - id: "decision_balanced"
                description: "Evidence 우선, 필요 시 Prior 허용"
                quality_profile_ref: "decision_balanced"
                validation_gates_ref: "cmis_validation_gates.yaml#gate_types"
              - id: "exploration_friendly"
                description: "기회 탐색용, Prior/패턴 활용 허용"
                quality_profile_ref: "exploration_friendly"
                validation_gates_ref: "cmis_validation_gates.yaml#gate_types"
          api:
            - name: "resolve_policy"
              description: "Role/용도에 따라 적용할 Policy 결정"
              input:
                role_id: "role_id"
                usage:   "enum[reporting,decision,exploration]"
              output:
                policy_ref: "policy_ref"

