                resolution_protocol:
                  description: "고객 수(N_customers) 추정을 위한 규칙 (모집단 × 침투율 구조)."
                  methods:
                    - id: "demographic_base"
                      description: "인구/사업체 수 등 모집단 데이터를 기반으로 대상 잠재 고객 풀을 산출."
                      required_inputs:
