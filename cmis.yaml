      strategy:   "STR-"
      scenario:   "SCN-"
      action:     "ACTN-"
      artifact:   "ART-"
      memory:     "MEM-"
      project:    "PRJ-"

    lineage_schema:
      description: "모든 주요 객체가 공유하는 lineage 스키마"
      fields:
        from_evidence_ids: { type: "list", required: false }
        from_value_ids: { type: "list",    required: false }
        from_pattern_ids: { type: "list",  required: false }
        from_program_id: { type: "string",            required: false }  # Value Program / Reasoning trace
        engine_ids: { type: "list",      required: false }  # value_engine, pattern_engine 등
        policy_id: { type: "string",            required: false }
        created_by_role: { type: "role_id",           required: false }
        created_at: { type: "datetime",          required: true }

  # ------------------------------------------------------------------
  # 4. Policies – 품질/리스크/모드 정의 (요약)
  # ------------------------------------------------------------------
  policies:
    quality_profiles:
      reporting_strict:
        min_literal_ratio: 0.7
        max_spread_ratio: 0.3
        allow_prior: false
      decision_balanced:
        min_literal_ratio: 0.5
        max_spread_ratio: 0.5
        allow_prior: true
      exploration_friendly:
        min_literal_ratio: 0.3
        max_spread_ratio: 0.7
        allow_prior: true

  # ------------------------------------------------------------------
  # 5. Canonical Workflows – 역할별 상위 레벨 워크플로
  # ------------------------------------------------------------------
  canonical_workflows:
    - id: "structure_analysis"
      role_id: "structure_analyst"
      description: "특정 시장/도메인의 구조/메커니즘 및 핵심 economics 이해"
      process_phases_ref: "cmis_process_phases.yaml#structure_analysis"
      steps:
        - call: "world_engine.snapshot"
          with:
            as_of: "latest"
            scope:
              domain_id: "@input.domain_id"
              region: "@input.region"
              segment: "@input.segment"
        - call: "pattern_engine.match_patterns"
          with:
            graph_slice_ref: "@prev.graph_slice_ref"
        - call: "value_engine.evaluate_metrics"
          with:
            metric_requests: "@metric_sets.structure_core_economics"
            policy_ref: "reporting_strict"

    - id: "opportunity_discovery"
      role_id: "opportunity_designer"
      description: "패턴/구조 기반 기회 발굴 및 Rough sizing"
      steps:
        - call: "world_engine.snapshot"
          with:
            as_of: "latest"
            scope:
              domain_id: "@input.domain_id"
              region: "@input.region"
              segment: "@input.segment"
        - call: "pattern_engine.discover_gaps"
          with:
            graph_slice_ref: "@prev.graph_slice_ref"
        - call: "value_engine.evaluate_metrics"
          with:
            metric_requests:
              - "@metric_sets.structure_core_economics"
              - "@metric_sets.opportunity_additional"
            policy_ref: "exploration_friendly"

    - id: "strategy_design"
      role_id: "strategy_architect"
      description: "Goal에 맞는 전략/시나리오 설계 및 평가"
      steps:
        - call: "strategy_engine.search_strategies"
          with:
            goal_id: "@input.goal_id"
            constraints: {}
        - call: "strategy_engine.evaluate_portfolio"
          with:
            strategy_ids: "@prev.strategy_ids"
            policy_ref: "decision_balanced"

    - id: "reality_monitoring"
      role_id: "reality_monitor"
      description: "예상 vs 실제 결과 비교 및 시스템 학습"
      steps:
        - call: "learning_engine.update_from_outcomes"
          with:
            outcome_ids: "recent_outcomes"
        - call: "value_engine.evaluate_metrics"
          with:
            metric_requests: "@metric_sets.monitoring_core"
            policy_ref: "reporting_strict"